name: Regenerate SDKs on OpenAPI Spec Change

on:
  repository_dispatch:
    types: [spec_updated]
  workflow_dispatch:
    inputs:
      version:
        description: 'API version to stamp on SDKs (e.g. 1.2.3)'
        required: false
        default: ''
      spec_url:
        description: 'URL to openapi.json'
        required: false
        default: ''

jobs:
  generate-and-test-sdks:
    name: Generate & Smoke Test SDKs
    runs-on: ubuntu-latest
    permissions:
      contents: write  # for pushing generated SDK code

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Set up PHP + Composer
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # ── Determine version ──────────────────────────────────────────────────
      - name: Determine API version
        id: ver
        run: |
          V="${{ github.event.inputs.version }}"
          if [ -z "$V" ]; then
            V="${{ github.event.client_payload.version }}"
          fi
          if [ -z "$V" ]; then
            V="$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//' || echo '1.0.0')"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"

      # ── Fetch spec if provided ──────────────────────────────────────────────
      - name: Fetch OpenAPI Spec
        run: |
          URL="${{ github.event.inputs.spec_url }}"
          if [ -z "$URL" ]; then
            URL="${{ github.event.client_payload.spec_url }}"
          fi
          if [ -n "$URL" ]; then
            mkdir -p spec
            curl -sS -L "$URL" -o spec/openapi.json
          fi

      # ── Clean generated SDKs ───────────────────────────────
      - name: Clean stale generated SDK source
        run: |
          # Wipe generated source trees; leave .openapi-generator-ignore so generator respects exclusions
          for d in crescendo-java crescendo-go crescendo-php crescendo-ruby crescendo-rust crescendo-dotnet; do
            find "$d" -mindepth 1 \
              ! -name '.openapi-generator-ignore' \
              ! -path '*/.openapi-generator' \
              -delete 2>/dev/null || true
          done

      # ── Generate all 6 SDKs ────────────────────────────────────────────────
      - name: Generate SDKs
        run: |
          API_VERSION="${{ steps.ver.outputs.version }}" SKIP_FETCH=true ./generate-sdks.sh

      # ── Verify the spec is scoped to the public API only ──────────────────
      - name: Verify spec scope (must be public API only, ≤60 paths)
        run: |
          PATH_COUNT=$(python3 -c "import json; d=json.load(open('spec/openapi.json')); print(len(d.get('paths',{})))")
          echo "Spec path count: $PATH_COUNT"
          if [ "$PATH_COUNT" -gt 60 ]; then
            echo "::error::Spec has $PATH_COUNT paths — expected ≤60 for the public API group."
            exit 1
          fi
          # Internal paths that must NOT appear in the public spec
          for BANNED in '"/admin' '"/settings' '"/guest/' '"/auth/' '"email/webhooks'; do
            if grep -q "$BANNED" spec/openapi.json; then
              echo "::error::Internal path $BANNED found in public spec"
              exit 1
            fi
          done
          echo "Spec scope verified ✓ ($PATH_COUNT paths)"

      # ── Smoke test every generated SDK ────────────────────────────────────
      - name: Smoke test SDKs
        run: ./smoke-test-sdks.sh

      # ── Commit generated SDKs back to repo ───────────────────────────────
      - name: Commit updated SDKs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(sdks): regenerate from OpenAPI spec v${{ steps.ver.outputs.version }} [skip ci]"
          file_pattern: 'crescendo-java/** crescendo-php/** crescendo-go/** crescendo-rust/** crescendo-ruby/** crescendo-dotnet/** spec/**'
          commit_author: 'GitHub Actions <actions@github.com>'
